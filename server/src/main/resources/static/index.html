<!DOCTYPE html>
<html>
<head>
    <title>Order Book WebSocket</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
          crossorigin="anonymous">
    <link href="/main.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script src="/app.js"></script>
</head>
<body>
<noscript>
    <h2 style="color: #ff0000">
        Seems your browser doesn't support Javascript! Websocket relies on Javascript being
        enabled. Please enable Javascript and reload this page!
    </h2>
</noscript>

<div id="main-content" class="container">
    <!-- WebSocket & Market Depth Menu -->
    <div class="row">
        <div class="col-md-6">
            <form class="form-inline">
                <div class="form-group">
                    <label for="connect">WebSocket Connection:</label>
                    <button id="connect" class="btn btn-default" type="submit">Connect</button>
                    <button id="disconnect" class="btn btn-default" type="submit" disabled="disabled">Disconnect</button>
                </div>
            </form>
        </div>

        <div class="col-md-6 text-left">
            <label for="bbo-button">Market Depth:</label>
            <button id="bbo-button" class="btn btn-default" type="button">L1 (BBO)</button>
            <button id="mbp-button" class="btn btn-default" type="button">L2 (MBP)</button>
            <button id="mbo-button" class="btn btn-default" type="button">L3 (MBO)</button>
        </div>
    </div>
    <hr/>

    <div class="row"  style="margin-top: 20px;">
        <div class="col-md-6">
            <table id="trade-table" class="table table-striped">
                <thead>
                <tr>
                    <th>Trade Feed</th>
                </tr>
                </thead>
                <tbody id="trades"></tbody>
            </table>
        </div>

        <div class="col-md-6">
            <div id="bbo-view">
                <table id="bbo-table" class="table table-striped text-center">
                    <thead>
                    <tr>
                        <th>Best Bid</th>
                        <th>Best Ask</th>
                    </tr>
                    </thead>
                    <tbody id="bbo"></tbody>
                </table>
            </div>

            <div id="mbp-view">
                <div class="row">
                    <div class="col-md-6">
                        <table id="mbp-bids-table" class="table table-striped text-center">
                            <thead>
                            <tr>
                                <th>Count</th>
                                <th>Size</th>
                                <th>Bid</th>
                            </tr>
                            </thead>
                            <tbody id="mbp-bids"></tbody>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <table id="mbp-asks-table" class="table table-striped text-center">
                            <thead>
                            <tr>
                                <th>Ask</th>
                                <th>Size</th>
                                <th>Count</th>
                            </tr>
                            </thead>
                            <tbody id="mbp-asks"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="mbo-view">
                <div class="row">
                    <div class="col-md-6">
                        <table id="mbo-bids-table" class="table table-striped text-center">
                            <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Size</th>
                                <th>Price</th>
                                <th>Side</th>
                            </tr>
                            </thead>
                            <tbody id="mbo-bids"></tbody>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <table id="mbo-asks-table" class="table table-striped text-center">
                            <thead>
                            <tr>
                                <th>Side</th>
                                <th>Price</th>
                                <th>Size</th>
                                <th>Timestamp</th>
                            </tr>
                            </thead>
                            <tbody id="mbo-asks"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
